<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spark — Legal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#FAFAF8; --surface:#F5F3EF; --border:#E8E6E0; --text:#1A1A18; --muted:#6B6B66; --accent:#3E6B57; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card-wrap { max-width: 440px; width: 100%; text-align: center; }
  .mark { width:64px; height:64px; border-radius:18px; margin:0 auto 18px;
    background: radial-gradient(circle at 50% 38%, #6FB99A, var(--accent));
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:34px; }
  h1 { font-family:'DM Serif Display',serif; font-size:34px; margin:0 0 6px; }
  p { color:var(--muted); margin:0 0 28px; }
  a.link { display:flex; align-items:center; justify-content:space-between;
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:18px 22px; margin:12px 0; text-decoration:none; color:var(--text);
    font-weight:500; transition: background .15s; }
  a.link:hover { background:#EFEDE7; }
  a.link span.arrow { color:var(--accent); }
</style>
</head>
<body>
  <div class="card-wrap">
    <div class="mark">✦</div>
    <h1>Spark</h1>
    <p>Legal &amp; privacy</p>
    <a class="link" href="privacy-policy.html">Privacy Policy <span class="arrow">→</span></a>
    <a class="link" href="terms-of-service.html">Terms of Service <span class="arrow">→</span></a>
  </div>
</body>
</html>
